services:
  api:
    healthcheck:
      test: [
        "CMD-SHELL",
        "node -e \"fetch('http://localhost:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
      ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATA_DIR: /data
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - landfill-data:/data
    expose:
      - "3000"

  proxy:
    build:
      context: .
      dockerfile: infra/caddy/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  landfill-data:
